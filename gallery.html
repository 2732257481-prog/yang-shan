<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#5C3A28">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>我们的回忆 — 致杨珊</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23E87A5D'><path d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'/></svg>">
  <script>
    function goBack() {
      var t = document.getElementById("page-transition");
      if (t) { t.classList.add("active"); setTimeout(function() { window.location.href = "index.html"; }, 400); }
      else { window.location.href = "index.html"; }
    }
  </script>
</head>
<body class="gallery-page">
  <div class="page-transition" id="page-transition"></div>

  <header class="gallery-header">
    <button class="gallery-back-btn" onclick="goBack()">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      <span>返回</span>
    </button>
    <span class="gallery-header-title">我们的回忆</span>
    <span style="width:60px"></span>
  </header>

  <div class="gallery-grid" id="gallery-grid">
    <div style="grid-column:1/-1; text-align:center; padding:60px 20px; color:rgba(255,255,255,0.5);">
      <p style="margin-bottom:8px; font-size:1.2rem;">&#x1F4F7; 加载中...</p>
      <p style="font-size:0.85rem;">照片正在载入，请稍候</p>
    </div>
  </div>

  <!-- Fullscreen Viewer -->
  <div class="viewer" id="viewer">
    <button class="viewer-close" onclick="closeViewer()" aria-label="关闭">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <div class="viewer-image-wrap" id="viewer-image-wrap">
      <img id="viewer-image" src="" alt="">
    </div>
    <div class="viewer-caption">
      <div class="viewer-dots" id="viewer-dots"></div>
      <h3 id="viewer-title"></h3>
      <p id="viewer-desc"></p>
    </div>
  </div>

  <script src="assets/js/gallery.js"></script>
  <script src="assets/js/gallery-music.js"></script>

  <div class="music-player" style="bottom: 80px;">
    <span class="music-label" id="gallery-music-label">手写的从前 — 周杰伦</span>
    <button class="music-btn" id="gallery-music-btn" aria-label="音乐控制">
      <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </button>
  </div>
</body>
</html>
